<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Prayer Times</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .prayer-card {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 320px;
            text-align: center;
        }

        .prayer-card h2 {
            margin: 0;
            color: #2c3e50;
            font-size: 24px;
        }

        .date-display {
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .prayer-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .prayer-list li {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            margin-bottom: 10px;
            background-color: #f8f9fa;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #34495e;
            transition: background-color 0.3s ease;
        }

        .prayer-list li:hover {
            background-color: #e2e6ea;
        }

        .prayer-name {
            color: #16a085;
        }
        
        .loading {
            color: #e67e22;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="prayer-card">
        <h2>Prayer Times</h2>
        <div class="date-display" id="date">Loading date...</div>
        
        <div id="loading-message" class="loading">Fetching times for Dhaka...</div>

        <ul class="prayer-list">
            <li><span class="prayer-name">Fajr</span> <span id="fajr">--:--</span></li>
            <li><span class="prayer-name">Dhuhr</span> <span id="dhuhr">--:--</span></li>
            <li><span class="prayer-name">Asr</span> <span id="asr">--:--</span></li>
            <li><span class="prayer-name">Maghrib</span> <span id="maghrib">--:--</span></li>
            <li><span class="prayer-name">Isha</span> <span id="isha">--:--</span></li>
        </ul>
    </div>

    <script>
        // Set your city and country here
        const city = 'Dhaka';
        const country = 'Bangladesh';

        // Function to fetch prayer times from the Aladhan API
        async function getPrayerTimes() {
            try {
                const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=${country}&method=1`);
                const data = await response.json();
                const timings = data.data.timings;

                // Update the date
                document.getElementById('date').innerText = data.data.date.readable;
                
                // Hide the loading message
                document.getElementById('loading-message').style.display = 'none';

                // Update the prayer times in the HTML
                document.getElementById('fajr').innerText = timings.Fajr;
                document.getElementById('dhuhr').innerText = timings.Dhuhr;
                document.getElementById('asr').innerText = timings.Asr;
                document.getElementById('maghrib').innerText = timings.Maghrib;
                document.getElementById('isha').innerText = timings.Isha;
                
            } catch (error) {
                console.error("Error fetching prayer times:", error);
                document.getElementById('loading-message').innerText = "Failed to load times.";
                document.getElementById('loading-message').style.color = "red";
            }
        }

        // Run the function when the page loads
        getPrayerTimes();
    </script>

</body>
</html>
