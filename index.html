<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        /* CSS to style the profile card */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }

        .profile-card {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            width: 250px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background-color: #007bff;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            margin: 0 auto 15px auto;
        }

        .profile-name {
            margin: 0;
            color: #333;
            font-size: 24px;
        }

        .profile-id {
            color: #777;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-avatar">J</div> 
        <h2 class="profile-name">Jalal Uddin</h2>
        <p class="profile-id">ID: #987654321</p>
    </div>

</body>
</html>
